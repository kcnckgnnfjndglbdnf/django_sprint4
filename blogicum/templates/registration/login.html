{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">Вход в систему</div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <hr>
        <p><a href="{% url 'password_reset' %}">Забыли пароль?</a></p>
        <p>Еще нет аккаунта? <a href="{% url 'registration' %}">Зарегистрироваться</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
